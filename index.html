<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Supper Club">
  <title>Supper Club Dubai</title>
  <style>
    :root {
      --bg: #0f0f13;
      --card: #1a1a24;
      --card2: #22222f;
      --accent: #c9a84c;
      --accent2: #e8c96a;
      --text: #f0ede6;
      --muted: #888;
      --green: #4caf7d;
      --red: #e05c5c;
      --blue: #5c9fe0;
      --tab-h: 58px;
      --safe: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100dvh; overflow-x: hidden; }

    /* TAB BAR */
    .tabbar { position: fixed; bottom: 0; left: 0; right: 0; height: calc(var(--tab-h) + var(--safe)); background: var(--card); border-top: 1px solid #2a2a3a; display: flex; z-index: 100; padding-bottom: var(--safe); }
    .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; color: var(--muted); font-size: 10px; font-weight: 600; letter-spacing: .3px; transition: color .2s; padding-top: 6px; }
    .tab .ico { font-size: 22px; line-height: 1; }
    .tab.active { color: var(--accent); }

    /* PAGES */
    .page { display: none; padding: 16px 16px calc(var(--tab-h) + var(--safe) + 20px); min-height: 100dvh; }
    .page.active { display: block; }

    /* HEADER */
    .hdr { display: flex; align-items: center; justify-content: space-between; padding: 52px 16px 12px; }
    .hdr h1 { font-size: 26px; font-weight: 700; color: var(--accent); }
    .hdr .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .hdr-actions { display: flex; gap: 10px; }
    .icon-btn { width: 38px; height: 38px; border-radius: 12px; background: var(--card); border: none; color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    /* CARDS */
    .card { background: var(--card); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
    .card-sm { background: var(--card2); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; }
    .card-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 10px; }

    /* KPI ROW */
    .kpi-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .kpi { background: var(--card); border-radius: 14px; padding: 14px; }
    .kpi-val { font-size: 22px; font-weight: 700; color: var(--accent); }
    .kpi-lbl { font-size: 11px; color: var(--muted); margin-top: 3px; }

    /* BTN */
    .btn { display: block; width: 100%; padding: 14px; border-radius: 14px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; text-align: center; transition: opacity .15s; }
    .btn:active { opacity: .7; }
    .btn-gold { background: var(--accent); color: #111; }
    .btn-outline { background: transparent; border: 1.5px solid var(--accent); color: var(--accent); }
    .btn-sm { padding: 9px 16px; font-size: 13px; border-radius: 10px; }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-ghost { background: var(--card2); color: var(--text); }

    /* CALENDAR */
    .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .cal-nav h2 { font-size: 18px; font-weight: 700; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-dow { text-align: center; font-size: 11px; color: var(--muted); font-weight: 600; padding: 4px 0; }
    .cal-day { aspect-ratio: 1; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; font-weight: 600; gap: 2px; transition: background .15s; }
    .cal-day.empty { cursor: default; }
    .cal-day.today { border: 1.5px solid var(--accent); }
    .cal-day.open { background: rgba(201,168,76,.15); color: var(--accent); }
    .cal-day.soldout { background: rgba(224,92,92,.15); color: var(--red); }
    .cal-day.confirmed { background: rgba(76,175,125,.15); color: var(--green); }
    .cal-dot { width: 5px; height: 5px; border-radius: 50%; }
    .cal-dot.open { background: var(--accent); }
    .cal-dot.soldout { background: var(--red); }
    .cal-dot.confirmed { background: var(--green); }

    /* LEGEND */
    .legend { display: flex; gap: 14px; margin-bottom: 16px; flex-wrap: wrap; }
    .leg-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); }
    .leg-dot { width: 8px; height: 8px; border-radius: 50%; }

    /* MODAL / BOTTOM SHEET */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 200; display: none; }
    .overlay.show { display: flex; align-items: flex-end; }
    .sheet { background: var(--card); border-radius: 22px 22px 0 0; width: 100%; max-height: 92dvh; overflow-y: auto; padding: 12px 16px calc(24px + var(--safe)); }
    .sheet-handle { width: 36px; height: 4px; background: #3a3a4a; border-radius: 2px; margin: 0 auto 18px; }
    .sheet-title { font-size: 20px; font-weight: 700; margin-bottom: 18px; }

    /* FORM */
    .form-row { margin-bottom: 14px; }
    .form-row label { display: block; font-size: 12px; color: var(--muted); font-weight: 600; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
    .form-row input, .form-row select, .form-row textarea { width: 100%; background: var(--card2); border: 1.5px solid #2a2a3a; border-radius: 12px; color: var(--text); font-size: 15px; padding: 12px 14px; outline: none; font-family: inherit; }
    .form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: var(--accent); }
    .form-row textarea { min-height: 80px; resize: none; }
    .form-row select option { background: #1a1a24; }

    /* STEPPER */
    .stepper { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 20px; }
    .step-dot { width: 8px; height: 8px; border-radius: 50%; background: #2a2a3a; transition: all .2s; }
    .step-dot.active { background: var(--accent); width: 24px; border-radius: 4px; }
    .step-dot.done { background: var(--green); }
    .step-lbl { font-size: 12px; color: var(--muted); text-align: center; margin-bottom: 14px; font-weight: 600; }

    /* GUEST CARD IN WIZARD */
    .guest-wiz-card { background: var(--card2); border-radius: 14px; padding: 14px; margin-bottom: 10px; }
    .guest-wiz-name { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
    .guest-wiz-restrict { font-size: 12px; color: var(--red); margin-bottom: 10px; }
    .pay-grid { display: flex; flex-wrap: wrap; gap: 6px; }
    .pay-pill { background: #2a2a3a; border-radius: 20px; padding: 6px 13px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; border: 1.5px solid transparent; }
    .pay-pill.sel { background: rgba(201,168,76,.2); border-color: var(--accent); color: var(--accent); }
    .paid-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; font-size: 13px; color: var(--muted); }
    .paid-row input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--green); }

    /* GUEST LIST SELECTOR */
    .guest-search { display: flex; gap: 8px; margin-bottom: 10px; }
    .guest-search input { flex: 1; background: var(--card2); border: 1.5px solid #2a2a3a; border-radius: 12px; color: var(--text); font-size: 15px; padding: 10px 12px; outline: none; }
    .guest-search input:focus { border-color: var(--accent); }
    .guest-pick-list { max-height: 200px; overflow-y: auto; margin-bottom: 10px; }
    .guest-pick-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #2a2a3a; cursor: pointer; }
    .guest-pick-item:last-child { border-bottom: none; }
    .gpi-name { font-size: 14px; font-weight: 600; }
    .gpi-restrict { font-size: 11px; color: var(--red); margin-top: 2px; }
    .gpi-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #3a3a4a; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .gpi-check.checked { background: var(--accent); border-color: var(--accent); color: #111; font-size: 13px; }

    /* COSTS */
    .cost-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #2a2a3a; }
    .cost-row:last-child { border-bottom: none; }
    .cost-cat { font-size: 11px; color: var(--muted); }
    .cost-name { font-size: 14px; font-weight: 600; }
    .cost-amt { font-size: 15px; font-weight: 700; color: var(--accent); }
    .cost-del { font-size: 18px; color: var(--red); cursor: pointer; padding: 4px; }

    /* P&L SUMMARY */
    .pnl-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #2a2a3a; font-size: 14px; }
    .pnl-row:last-child { border-bottom: none; }
    .pnl-row.total { font-weight: 700; font-size: 16px; }
    .pnl-pos { color: var(--green); }
    .pnl-neg { color: var(--red); }

    /* BADGE */
    .badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .badge-green { background: rgba(76,175,125,.2); color: var(--green); }
    .badge-red { background: rgba(224,92,92,.2); color: var(--red); }
    .badge-gold { background: rgba(201,168,76,.2); color: var(--accent); }
    .badge-blue { background: rgba(92,159,224,.2); color: var(--blue); }

    /* STORICO EVENT CARD */
    .ev-card { background: var(--card); border-radius: 16px; padding: 16px; margin-bottom: 12px; cursor: pointer; }
    .ev-card-hdr { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .ev-card-date { font-size: 17px; font-weight: 700; }
    .ev-card-stats { display: flex; gap: 16px; font-size: 13px; color: var(--muted); }
    .ev-stat { display: flex; flex-direction: column; }
    .ev-stat-v { font-size: 15px; font-weight: 700; color: var(--text); }

    /* GUEST PROFILE */
    .guest-card { background: var(--card); border-radius: 16px; padding: 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 14px; cursor: pointer; }
    .guest-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--card2); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .guest-info { flex: 1; }
    .guest-name { font-size: 15px; font-weight: 700; }
    .guest-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .guest-restrict { font-size: 12px; color: var(--red); margin-top: 3px; }

    /* AI CHAT */
    .chat-wrap { display: flex; flex-direction: column; height: calc(100dvh - var(--tab-h) - var(--safe) - 70px); }
    .chat-msgs { flex: 1; overflow-y: auto; padding: 8px 0; }
    .chat-msg { display: flex; gap: 8px; margin-bottom: 14px; align-items: flex-end; }
    .chat-msg.user { flex-direction: row-reverse; }
    .chat-bubble { max-width: 80%; padding: 11px 14px; border-radius: 18px; font-size: 14px; line-height: 1.5; }
    .chat-msg.ai .chat-bubble { background: var(--card); border-bottom-left-radius: 4px; }
    .chat-msg.user .chat-bubble { background: var(--accent); color: #111; border-bottom-right-radius: 4px; font-weight: 600; }
    .chat-av { width: 30px; height: 30px; border-radius: 50%; background: var(--card2); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .chat-input-row { display: flex; gap: 8px; padding-top: 10px; }
    .chat-input-row input { flex: 1; background: var(--card); border: 1.5px solid #2a2a3a; border-radius: 22px; color: var(--text); font-size: 15px; padding: 11px 16px; outline: none; }
    .chat-input-row input:focus { border-color: var(--accent); }
    .chat-send { width: 44px; height: 44px; border-radius: 50%; background: var(--accent); border: none; color: #111; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .chat-img-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--card); border: none; color: var(--text); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .typing { display: flex; gap: 4px; padding: 12px 14px; }
    .typing span { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); animation: bounce .9s infinite; }
    .typing span:nth-child(2) { animation-delay: .2s; }
    .typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    /* ACTION CARD */
    .action-card { background: var(--card2); border-radius: 12px; padding: 12px; margin-top: 8px; border: 1px solid #2a2a3a; }
    .action-card-title { font-size: 12px; color: var(--muted); margin-bottom: 8px; font-weight: 600; }
    .action-card .btn { margin-top: 6px; }

    /* NUM STEPPER */
    .num-stepper { display: flex; align-items: center; gap: 0; border: 1.5px solid #2a2a3a; border-radius: 12px; overflow: hidden; }
    .num-stepper button { width: 44px; height: 44px; background: var(--card2); border: none; color: var(--text); font-size: 22px; cursor: pointer; }
    .num-stepper input { flex: 1; text-align: center; background: transparent; border: none; color: var(--text); font-size: 18px; font-weight: 700; outline: none; min-width: 0; }

    /* STATUS PILLS */
    .status-pills { display: flex; gap: 8px; }
    .status-pill { flex: 1; padding: 10px; text-align: center; border-radius: 12px; background: var(--card2); border: 1.5px solid transparent; font-size: 13px; font-weight: 700; cursor: pointer; }
    .status-pill.sel-open { border-color: var(--accent); background: rgba(201,168,76,.15); color: var(--accent); }
    .status-pill.sel-soldout { border-color: var(--red); background: rgba(224,92,92,.15); color: var(--red); }
    .status-pill.sel-confirmed { border-color: var(--green); background: rgba(76,175,125,.15); color: var(--green); }

    /* UTIL */
    .divider { height: 1px; background: #2a2a3a; margin: 14px 0; }
    .txt-muted { color: var(--muted); font-size: 13px; }
    .txt-green { color: var(--green); }
    .txt-red { color: var(--red); }
    .txt-gold { color: var(--accent); }
    .row { display: flex; align-items: center; justify-content: space-between; }
    .mt8 { margin-top: 8px; }
    .mt14 { margin-top: 14px; }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
    .empty-state .ico { font-size: 48px; margin-bottom: 10px; }
    .empty-state p { font-size: 14px; line-height: 1.6; }
    .scan-btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 13px; border-radius: 14px; background: rgba(201,168,76,.12); border: 1.5px dashed var(--accent); color: var(--accent); font-size: 14px; font-weight: 700; cursor: pointer; margin-bottom: 12px; }
    #imgInput, #chatImgInput { display: none; }
    .restrict-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
    .restrict-tag { background: rgba(224,92,92,.15); color: var(--red); border-radius: 20px; padding: 3px 10px; font-size: 11px; font-weight: 600; }
    .section-sep { margin: 18px 0 12px; font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; display: flex; align-items: center; gap: 8px; }
    .section-sep::after { content: ''; flex: 1; height: 1px; background: #2a2a3a; }
  </style>
</head>
<body>

<!-- ===================== PAGES ===================== -->

<!-- DASHBOARD -->
<div id="pg-dashboard" class="page active">
  <div class="hdr">
    <div>
      <h1>Supper Club 🍽️</h1>
      <div class="sub" id="dash-sub">Dubai · AED</div>
    </div>
    <div class="hdr-actions">
      <button class="icon-btn" onclick="openSettings()">⚙️</button>
    </div>
  </div>
  <div id="dash-content"></div>
</div>

<!-- CALENDARIO -->
<div id="pg-calendario" class="page">
  <div class="hdr">
    <div><h1>Calendario</h1></div>
    <div class="hdr-actions">
      <button class="icon-btn" onclick="prevMonth()">‹</button>
      <button class="icon-btn" onclick="nextMonth()">›</button>
    </div>
  </div>
  <div style="padding: 0 16px;">
    <div class="cal-nav">
      <h2 id="cal-month-lbl"></h2>
    </div>
    <div class="legend">
      <div class="leg-item"><div class="leg-dot" style="background:var(--accent)"></div>Aperta</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--red)"></div>Sold Out</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--green)"></div>Confermata</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>
</div>

<!-- STORICO -->
<div id="pg-storico" class="page">
  <div class="hdr"><div><h1>Storico</h1></div></div>
  <div id="storico-list"></div>
</div>

<!-- OSPITI -->
<div id="pg-ospiti" class="page">
  <div class="hdr">
    <div><h1>Ospiti</h1></div>
    <div class="hdr-actions">
      <button class="icon-btn" onclick="openGuestForm()">➕</button>
    </div>
  </div>
  <div style="padding: 0 16px 8px;">
    <div style="display:flex;gap:8px;margin-bottom:12px;">
      <input id="guest-search" type="text" placeholder="Cerca ospite..." style="flex:1;background:var(--card);border:1.5px solid #2a2a3a;border-radius:12px;color:var(--text);font-size:15px;padding:10px 14px;outline:none;" oninput="renderGuestList()">
    </div>
  </div>
  <div id="guest-list" style="padding: 0 16px;"></div>
</div>

<!-- AI -->
<div id="pg-ai" class="page">
  <div class="hdr"><div><h1>🤖 Assistente</h1><div class="sub">Italiano & English</div></div></div>
  <div style="padding: 0 16px;">
    <div class="chat-wrap">
      <div class="chat-msgs" id="chat-msgs"></div>
      <div class="chat-input-row">
        <label class="chat-img-btn" for="chatImgInput">📎</label>
        <input type="file" id="chatImgInput" accept="image/*" onchange="chatImgSelected(this)">
        <input type="text" id="chat-in" placeholder="Scrivi un messaggio..." onkeydown="if(event.key==='Enter')sendChat()">
        <button class="chat-send" onclick="sendChat()">▶</button>
      </div>
    </div>
  </div>
</div>

<!-- TAB BAR -->
<div class="tabbar">
  <div class="tab active" onclick="showPage('dashboard')">
    <div class="ico">📊</div>Home
  </div>
  <div class="tab" onclick="showPage('calendario')">
    <div class="ico">📅</div>Cal
  </div>
  <div class="tab" onclick="showPage('storico')">
    <div class="ico">📋</div>Storia
  </div>
  <div class="tab" onclick="showPage('ospiti')">
    <div class="ico">👥</div>Ospiti
  </div>
  <div class="tab" onclick="showPage('ai')">
    <div class="ico">🤖</div>AI
  </div>
</div>

<!-- ===================== MODALS ===================== -->

<!-- SLOT WIZARD -->
<div class="overlay" id="wiz-overlay" onclick="closeWizIfBg(event)">
  <div class="sheet" id="wiz-sheet">
    <div class="sheet-handle"></div>
    <div id="wiz-content"></div>
  </div>
</div>

<!-- GUEST FORM -->
<div class="overlay" id="guest-overlay" onclick="closeGuestIfBg(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="guest-form-title">Nuovo Ospite</div>
    <div id="guest-form-content"></div>
  </div>
</div>

<!-- GUEST DETAIL -->
<div class="overlay" id="gdetail-overlay" onclick="closeDetailIfBg(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div id="gdetail-content"></div>
  </div>
</div>

<!-- EVENT DETAIL -->
<div class="overlay" id="evdetail-overlay" onclick="closeEvDetailIfBg(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div id="evdetail-content"></div>
  </div>
</div>

<!-- SETTINGS -->
<div class="overlay" id="settings-overlay" onclick="closeSettingsIfBg(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Impostazioni</div>
    <div class="form-row">
      <label>Nome Supper Club</label>
      <input type="text" id="cfg-name" placeholder="Il tuo supper club">
    </div>
    <div class="form-row">
      <label>OpenAI API Key</label>
      <input type="password" id="cfg-key" placeholder="sk-...">
    </div>
    <div style="margin-top:18px;">
      <button class="btn btn-gold" onclick="saveSettings()">Salva</button>
    </div>
    <div class="divider"></div>
    <button class="btn btn-outline btn-sm" onclick="exportData()">📤 Esporta Dati JSON</button>
  </div>
</div>

<!-- IMAGE CAPTURE (hidden) -->
<input type="file" id="imgInput" accept="image/*" onchange="handleReceiptScan(this)">

<script>
// ===================== STORAGE =====================
const K = { ev:'sc_ev3', gs:'sc_gs3', sl:'sc_sl3', cfg:'sc_cfg3' };
const ls = {
  get: k => { try { return JSON.parse(localStorage.getItem(k)||'null'); } catch(e){ return null; } },
  set: (k,v) => localStorage.setItem(k, JSON.stringify(v))
};

function getEvents()  { return ls.get(K.ev) || []; }
function getGuests()  { return ls.get(K.gs) || []; }
function getSlots()   { return ls.get(K.sl) || []; }
function getCfg()     { return ls.get(K.cfg) || {}; }

function saveEvents(a)  { ls.set(K.ev, a); }
function saveGuests(a)  { ls.set(K.gs, a); }
function saveSlots(a)   { ls.set(K.sl, a); }
function saveCfg(o)     { ls.set(K.cfg, o); }

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function aed(n) { return 'AED ' + Number(n||0).toFixed(2); }
function fmtDate(d) {
  const date = new Date(d + 'T12:00:00');
  return date.toLocaleDateString('it-IT', {weekday:'short', day:'numeric', month:'short', year:'numeric'});
}
function today() {
  const d = new Date();
  return d.toISOString().slice(0,10);
}

// ===================== NAV =====================
const PAGES = ['dashboard','calendario','storico','ospiti','ai'];
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('pg-' + name).classList.add('active');
  const idx = PAGES.indexOf(name);
  document.querySelectorAll('.tab')[idx].classList.add('active');
  if (name === 'dashboard') renderDashboard();
  if (name === 'calendario') renderCalendar();
  if (name === 'storico') renderStorico();
  if (name === 'ospiti') renderGuestList();
  if (name === 'ai' && chatMsgs.length === 0) initChat();
}

// ===================== DASHBOARD =====================
function renderDashboard() {
  const events = getEvents();
  const cfg = getCfg();
  document.getElementById('dash-sub').textContent = (cfg.name || 'Supper Club') + ' · AED · Dubai';

  const thisMonth = today().slice(0,7);
  const monthEvs = events.filter(e => e.data && e.data.startsWith(thisMonth));
  const totalRev = monthEvs.reduce((s,e) => s + (e.ricavi?.totale||0), 0);
  const totalCost = monthEvs.reduce((s,e) => s + (e.costi?.totale||0), 0);
  const totalProfit = totalRev - totalCost;

  const upcomingSlots = getSlots().filter(s => s.date >= today() && s.status !== 'closed');
  upcomingSlots.sort((a,b) => a.date.localeCompare(b.date));

  let html = `
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-val">${aed(totalRev)}</div><div class="kpi-lbl">Ricavi questo mese</div></div>
      <div class="kpi"><div class="kpi-val ${totalProfit>=0?'txt-green':'txt-red'}">${aed(totalProfit)}</div><div class="kpi-lbl">Profitto questo mese</div></div>
    </div>
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-val">${monthEvs.length}</div><div class="kpi-lbl">Serate questo mese</div></div>
      <div class="kpi"><div class="kpi-val">${totalCost > 0 ? Math.round((totalProfit/totalRev)*100) : 0}%</div><div class="kpi-lbl">Margine medio</div></div>
    </div>
  `;

  if (upcomingSlots.length > 0) {
    html += `<div class="card-title" style="margin:6px 0 8px;">Prossime serate</div>`;
    upcomingSlots.slice(0,3).forEach(sl => {
      const ev = events.find(e => e.id === sl.eventId);
      const gCount = ev ? (ev.guests?.length||0) : 0;
      const statusCls = sl.status === 'open' ? 'badge-gold' : sl.status === 'soldout' ? 'badge-red' : 'badge-green';
      const statusLbl = sl.status === 'open' ? 'Aperta' : sl.status === 'soldout' ? 'Sold Out' : 'Confermata';
      html += `
        <div class="card-sm row" style="cursor:pointer;" onclick="openSlotWizard('${sl.date}')">
          <div>
            <div style="font-weight:700;font-size:15px;">${fmtDate(sl.date)}</div>
            <div class="txt-muted" style="margin-top:3px;">${gCount}/${sl.maxGuests||8} ospiti · ${aed(sl.pricePerPerson||0)}/p</div>
          </div>
          <span class="badge ${statusCls}">${statusLbl}</span>
        </div>`;
    });
  } else {
    html += `<div class="card" style="text-align:center;padding:20px;">
      <div style="font-size:36px;margin-bottom:8px;">📅</div>
      <div class="txt-muted">Nessuna serata pianificata</div>
    </div>`;
  }

  html += `<div style="margin-top:14px;"><button class="btn btn-gold" onclick="showPage('calendario')">+ Nuova Serata</button></div>`;
  document.getElementById('dash-content').innerHTML = html;
}

// ===================== CALENDAR =====================
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();

function prevMonth() { calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); }
function nextMonth() { calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); }

function renderCalendar() {
  const MONTHS = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  document.getElementById('cal-month-lbl').textContent = MONTHS[calMonth] + ' ' + calYear;

  const slots = getSlots();
  const slotMap = {};
  slots.forEach(s => { slotMap[s.date] = s; });

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const todayStr = today();
  const startOffset = (firstDay + 6) % 7; // Mon-start

  let html = ['Lu','Ma','Me','Gi','Ve','Sa','Do'].map(d => `<div class="cal-dow">${d}</div>`).join('');
  for (let i = 0; i < startOffset; i++) html += `<div class="cal-day empty"></div>`;

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const sl = slotMap[dateStr];
    const isToday = dateStr === todayStr;
    let cls = 'cal-day';
    let dot = '';
    if (sl) {
      cls += ' ' + sl.status;
      dot = `<div class="cal-dot ${sl.status}"></div>`;
    }
    if (isToday) cls += ' today';
    html += `<div class="${cls}" onclick="openSlotWizard('${dateStr}')">${d}${dot}</div>`;
  }
  document.getElementById('cal-grid').innerHTML = html;
}

// ===================== WIZARD =====================
let wiz = null;
let wizStep = 1;
let editingEventId = null;

function openSlotWizard(dateStr) {
  const slots = getSlots();
  const events = getEvents();
  const existingSlot = slots.find(s => s.date === dateStr);
  const existingEvent = existingSlot?.eventId ? events.find(e => e.id === existingSlot.eventId) : null;

  if (existingEvent) {
    // Load existing event into wiz
    wiz = {
      date: dateStr,
      maxGuests: existingEvent.maxGuests || 8,
      pricePerPerson: existingEvent.pricePerPerson || 0,
      status: existingSlot.status || 'open',
      guests: JSON.parse(JSON.stringify(existingEvent.guests || [])),
      costs: JSON.parse(JSON.stringify(existingEvent.costs || [])),
      note: existingEvent.note || '',
      eventId: existingEvent.id,
      nome: existingEvent.nome || ''
    };
    editingEventId = existingEvent.id;
  } else {
    wiz = {
      date: dateStr,
      maxGuests: 8,
      pricePerPerson: 0,
      status: 'open',
      guests: [],
      costs: [],
      note: '',
      eventId: null,
      nome: ''
    };
    editingEventId = null;
  }

  wizStep = 1;
  document.getElementById('wiz-overlay').classList.add('show');
  renderWiz();
}

function closeWizIfBg(e) {
  if (e.target === document.getElementById('wiz-overlay')) closeWiz();
}
function closeWiz() {
  document.getElementById('wiz-overlay').classList.remove('show');
  wiz = null;
}

function renderWiz() {
  if (wizStep === 1) renderWizStep1();
  else if (wizStep === 2) renderWizStep2();
  else if (wizStep === 3) renderWizStep3();
}

// STEP 1: Date + Setup
function renderWizStep1() {
  const statusLabels = { open: '🟡 Aperta', soldout: '🔴 Sold Out', confirmed: '🟢 Confermata' };
  document.getElementById('wiz-content').innerHTML = `
    <div class="stepper">
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
      <div class="step-dot"></div>
    </div>
    <div class="step-lbl">Setup serata · ${fmtDate(wiz.date)}</div>
    <div class="form-row">
      <label>Posti disponibili (max 8)</label>
      <div class="num-stepper">
        <button onclick="adjGuests(-1)">−</button>
        <input type="number" id="w-seats" value="${wiz.maxGuests}" min="1" max="8" oninput="wiz.maxGuests=Math.max(1,Math.min(8,parseInt(this.value)||1))">
        <button onclick="adjGuests(1)">+</button>
      </div>
    </div>
    <div class="form-row">
      <label>Prezzo per persona (AED)</label>
      <input type="number" id="w-price" value="${wiz.pricePerPerson}" min="0" step="10" placeholder="0.00" inputmode="decimal">
    </div>
    <div class="form-row">
      <label>Nome serata (opzionale)</label>
      <input type="text" id="w-nome" value="${wiz.nome}" placeholder="es. Serata italiana">
    </div>
    <div class="form-row">
      <label>Stato</label>
      <div class="status-pills">
        ${['open','soldout','confirmed'].map(s => `<div class="status-pill ${wiz.status===s?'sel-'+s:''}" onclick="selStatus('${s}')">${statusLabels[s]}</div>`).join('')}
      </div>
    </div>
    <div class="form-row">
      <label>Note</label>
      <textarea id="w-note" placeholder="Note per questa serata...">${wiz.note}</textarea>
    </div>
    <div style="margin-top:10px; display:flex; gap:10px;">
      <button class="btn btn-ghost" style="flex:1;" onclick="closeWiz()">Annulla</button>
      <button class="btn btn-gold" style="flex:2;" onclick="wizNext1()">Ospiti →</button>
    </div>
    ${editingEventId ? `<div style="margin-top:10px;"><button class="btn btn-danger btn-sm" onclick="deleteSlot()">🗑 Elimina serata</button></div>` : ''}
  `;
}

function adjGuests(d) {
  wiz.maxGuests = Math.max(1, Math.min(8, wiz.maxGuests + d));
  document.getElementById('w-seats').value = wiz.maxGuests;
}
function selStatus(s) {
  wiz.status = s;
  renderWizStep1();
}
function wizNext1() {
  wiz.maxGuests = parseInt(document.getElementById('w-seats').value)||8;
  wiz.pricePerPerson = parseFloat(document.getElementById('w-price').value)||0;
  wiz.nome = document.getElementById('w-nome').value;
  wiz.note = document.getElementById('w-note').value;
  wizStep = 2;
  renderWiz();
}

// STEP 2: Guests + Payment
const PAYMENT_METHODS = ['Spliduu','Ziina','Bank Transfer','Breaking Bread','Cash'];
let guestSearch2 = '';
let showAddGuestForm = false;
let newGuestDraft = { name:'', instagram:'', phone:'', restrictions:'', notes:'' };

function renderWizStep2() {
  const allGuests = getGuests();
  const filtered = allGuests.filter(g => {
    if (!guestSearch2) return true;
    return (g.name||'').toLowerCase().includes(guestSearch2.toLowerCase());
  });
  const selectedIds = wiz.guests.map(g => g.guestId);

  let guestCards = '';
  wiz.guests.forEach(wg => {
    const g = allGuests.find(x => x.id === wg.guestId);
    if (!g) return;
    const restr = (g.restrictions||'').trim();
    guestCards += `
      <div class="guest-wiz-card">
        <div class="row">
          <div class="guest-wiz-name">👤 ${g.name}</div>
          <button style="background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;" onclick="removeWizGuest('${wg.guestId}')">✕</button>
        </div>
        ${restr ? `<div class="guest-wiz-restrict">⚠️ ${restr}</div>` : ''}
        <div style="font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:600;">PAGAMENTO</div>
        <div class="pay-grid">
          ${PAYMENT_METHODS.map(pm => `<div class="pay-pill ${wg.paymentMethod===pm?'sel':''}" onclick="selPay('${wg.guestId}','${pm}')">${pm}</div>`).join('')}
        </div>
        <div class="paid-row">
          <input type="checkbox" id="paid-${wg.guestId}" ${wg.paid?'checked':''} onchange="togglePaid('${wg.guestId}',this.checked)">
          <label for="paid-${wg.guestId}">Pagato ✓</label>
        </div>
      </div>`;
  });

  let addForm = '';
  if (showAddGuestForm) {
    addForm = `
      <div class="card-sm" style="margin-bottom:10px;">
        <div style="font-size:13px;font-weight:700;margin-bottom:10px;">Nuovo ospite on-the-fly</div>
        <input type="text" id="ng-name" placeholder="Nome *" style="width:100%;background:var(--bg);border:1.5px solid #2a2a3a;border-radius:10px;color:var(--text);font-size:14px;padding:9px 12px;margin-bottom:7px;outline:none;" value="${newGuestDraft.name}">
        <input type="text" id="ng-insta" placeholder="Instagram (@...)" style="width:100%;background:var(--bg);border:1.5px solid #2a2a3a;border-radius:10px;color:var(--text);font-size:14px;padding:9px 12px;margin-bottom:7px;outline:none;" value="${newGuestDraft.instagram}">
        <input type="text" id="ng-restrict" placeholder="Intolleranze / Restrizioni" style="width:100%;background:var(--bg);border:1.5px solid #2a2a3a;border-radius:10px;color:var(--text);font-size:14px;padding:9px 12px;margin-bottom:10px;outline:none;" value="${newGuestDraft.restrictions}">
        <div style="display:flex;gap:8px;">
          <button class="btn btn-ghost btn-sm" style="flex:1;" onclick="showAddGuestForm=false;renderWizStep2()">Annulla</button>
          <button class="btn btn-gold btn-sm" style="flex:2;" onclick="saveNewGuestOnFly()">Aggiungi</button>
        </div>
      </div>`;
  }

  document.getElementById('wiz-content').innerHTML = `
    <div class="stepper">
      <div class="step-dot done"></div>
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
    </div>
    <div class="step-lbl">Ospiti · ${wiz.guests.length}/${wiz.maxGuests} posti</div>

    ${guestCards}

    ${wiz.guests.length < wiz.maxGuests ? `
    <div class="section-sep">Aggiungi ospite</div>
    <div class="guest-search">
      <input type="text" placeholder="Cerca dalla rubrica..." value="${guestSearch2}" oninput="guestSearch2=this.value;renderWizStep2()" id="g-search-inp">
    </div>
    ${addForm}
    <div class="guest-pick-list">
      ${filtered.length === 0 && !showAddGuestForm ? `<div class="txt-muted" style="text-align:center;padding:12px;">Nessun ospite trovato</div>` : ''}
      ${filtered.map(g => {
        const isSelected = selectedIds.includes(g.id);
        if (isSelected) return '';
        return `<div class="guest-pick-item" onclick="addWizGuest('${g.id}')">
          <div>
            <div class="gpi-name">${g.name}</div>
            ${g.restrictions ? `<div class="gpi-restrict">⚠️ ${g.restrictions}</div>` : ''}
          </div>
          <div class="gpi-check">${isSelected?'✓':''}</div>
        </div>`;
      }).join('')}
    </div>
    ${!showAddGuestForm ? `<button class="btn btn-outline btn-sm" onclick="showAddGuestForm=true;renderWizStep2()">+ Nuovo ospite</button>` : ''}
    ` : `<div class="txt-muted" style="text-align:center;padding:10px;">Posti esauriti (${wiz.maxGuests}/${wiz.maxGuests})</div>`}

    <div style="margin-top:16px;display:flex;gap:10px;">
      <button class="btn btn-ghost" style="flex:1;" onclick="wizStep=1;renderWiz()">← Indietro</button>
      <button class="btn btn-gold" style="flex:2;" onclick="wizStep=3;renderWiz()">Costi →</button>
    </div>
  `;
}

function addWizGuest(gid) {
  if (wiz.guests.length >= wiz.maxGuests) return;
  if (wiz.guests.find(g => g.guestId === gid)) return;
  wiz.guests.push({ guestId: gid, paymentMethod: null, paid: false });
  renderWizStep2();
}
function removeWizGuest(gid) {
  wiz.guests = wiz.guests.filter(g => g.guestId !== gid);
  renderWizStep2();
}
function selPay(gid, pm) {
  const wg = wiz.guests.find(g => g.guestId === gid);
  if (wg) { wg.paymentMethod = pm; renderWizStep2(); }
}
function togglePaid(gid, val) {
  const wg = wiz.guests.find(g => g.guestId === gid);
  if (wg) wg.paid = val;
}
function saveNewGuestOnFly() {
  const name = document.getElementById('ng-name')?.value?.trim();
  if (!name) return;
  const newGuest = {
    id: uid(),
    name,
    instagram: document.getElementById('ng-insta')?.value?.trim() || '',
    phone: '',
    restrictions: document.getElementById('ng-restrict')?.value?.trim() || '',
    notes: '',
    addedAt: new Date().toISOString()
  };
  const guests = getGuests();
  guests.push(newGuest);
  saveGuests(guests);
  wiz.guests.push({ guestId: newGuest.id, paymentMethod: null, paid: false });
  showAddGuestForm = false;
  newGuestDraft = { name:'', instagram:'', phone:'', restrictions:'', notes:'' };
  renderWizStep2();
}

// STEP 3: Costs + P&L + Save
function renderWizStep3() {
  const rev = wiz.guests.length * wiz.pricePerPerson;
  const costTotal = wiz.costs.reduce((s,c) => s + (c.amount||0), 0);
  const profit = rev - costTotal;
  const cpp = wiz.guests.length > 0 ? costTotal / wiz.guests.length : 0;

  const COST_CATS = ['🥩 Cibo','🍷 Vino','🌿 Ingredienti','🚿 Pulizie','💡 Varie'];

  let costsHtml = wiz.costs.length === 0 ? '<div class="txt-muted" style="padding:8px 0;">Nessun costo aggiunto</div>' :
    wiz.costs.map((c,i) => `
      <div class="cost-row">
        <div>
          <div class="cost-cat">${c.cat}</div>
          <div class="cost-name">${c.name}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="cost-amt">${aed(c.amount)}</div>
          <div class="cost-del" onclick="delWizCost(${i})">✕</div>
        </div>
      </div>`).join('');

  document.getElementById('wiz-content').innerHTML = `
    <div class="stepper">
      <div class="step-dot done"></div>
      <div class="step-dot done"></div>
      <div class="step-dot active"></div>
    </div>
    <div class="step-lbl">Costi & P&L · ${fmtDate(wiz.date)}</div>

    <label class="scan-btn" for="imgInput">📸 Scansiona scontrino con AI</label>
    <input type="file" id="imgInput" accept="image/*" onchange="handleReceiptScan(this)">

    <div class="card-sm" style="margin-bottom:12px;">
      ${costsHtml}
    </div>

    <div id="add-cost-form">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
        <select id="nc-cat" style="background:var(--card2);border:1.5px solid #2a2a3a;border-radius:10px;color:var(--text);font-size:14px;padding:9px 10px;outline:none;">
          ${COST_CATS.map(c=>`<option>${c}</option>`).join('')}
        </select>
        <input type="number" id="nc-amt" placeholder="AED" min="0" step="0.01" inputmode="decimal" style="background:var(--card2);border:1.5px solid #2a2a3a;border-radius:10px;color:var(--text);font-size:14px;padding:9px 10px;outline:none;">
      </div>
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <input type="text" id="nc-name" placeholder="Descrizione" style="flex:1;background:var(--card2);border:1.5px solid #2a2a3a;border-radius:10px;color:var(--text);font-size:14px;padding:9px 12px;outline:none;">
        <button class="btn btn-gold btn-sm" style="flex-shrink:0;" onclick="addWizCost()">+ Aggiungi</button>
      </div>
    </div>

    <div class="card-sm">
      <div class="card-title">P&L Preview</div>
      <div class="pnl-row"><span>Ospiti</span><span>${wiz.guests.length} × ${aed(wiz.pricePerPerson)}</span></div>
      <div class="pnl-row"><span>Ricavi</span><span class="pnl-pos">${aed(rev)}</span></div>
      <div class="pnl-row"><span>Costi totali</span><span class="pnl-neg">${aed(costTotal)}</span></div>
      <div class="pnl-row"><span>Costo/persona</span><span>${aed(cpp)}</span></div>
      <div class="pnl-row total"><span>Profitto</span><span class="${profit>=0?'pnl-pos':'pnl-neg'}">${aed(profit)}</span></div>
      ${rev > 0 ? `<div class="pnl-row"><span>Margine</span><span class="${profit>=0?'pnl-pos':'pnl-neg'}">${Math.round((profit/rev)*100)}%</span></div>` : ''}
    </div>

    <div style="margin-top:16px;display:flex;gap:10px;">
      <button class="btn btn-ghost" style="flex:1;" onclick="wizStep=2;renderWiz()">← Ospiti</button>
      <button class="btn btn-gold" style="flex:2;" onclick="saveSlotFinal()">💾 Salva Serata</button>
    </div>
  `;
}

function addWizCost() {
  const cat = document.getElementById('nc-cat')?.value || '';
  const name = document.getElementById('nc-name')?.value?.trim() || '';
  const amount = parseFloat(document.getElementById('nc-amt')?.value) || 0;
  if (!name || !amount) return;
  wiz.costs.push({ cat, name, amount });
  renderWizStep3();
}
function delWizCost(i) {
  wiz.costs.splice(i,1);
  renderWizStep3();
}

function saveSlotFinal() {
  const events = getEvents();
  const slots = getSlots();
  const rev = wiz.guests.length * wiz.pricePerPerson;
  const costTotal = wiz.costs.reduce((s,c) => s + (c.amount||0), 0);
  const profit = rev - costTotal;
  const cpp = wiz.guests.length > 0 ? costTotal / wiz.guests.length : 0;

  const eventData = {
    id: editingEventId || uid(),
    nome: wiz.nome,
    data: wiz.date,
    status: wiz.status,
    maxGuests: wiz.maxGuests,
    pricePerPerson: wiz.pricePerPerson,
    guests: wiz.guests,
    costs: wiz.costs,
    note: wiz.note,
    ricavi: { totale: rev, perPersona: wiz.pricePerPerson, nOspiti: wiz.guests.length },
    costi: { ingredienti: costTotal, totale: costTotal },
    profitto: profit,
    margine: rev > 0 ? (profit/rev)*100 : 0,
    cpp,
    savedAt: new Date().toISOString()
  };

  if (editingEventId) {
    const idx = events.findIndex(e => e.id === editingEventId);
    if (idx !== -1) events[idx] = eventData; else events.push(eventData);
  } else {
    events.push(eventData);
  }
  saveEvents(events);

  // Update slot
  const slotIdx = slots.findIndex(s => s.date === wiz.date);
  const slotData = { date: wiz.date, status: wiz.status, maxGuests: wiz.maxGuests, pricePerPerson: wiz.pricePerPerson, eventId: eventData.id };
  if (slotIdx !== -1) slots[slotIdx] = slotData; else slots.push(slotData);
  saveSlots(slots);

  closeWiz();
  renderCalendar();
  renderDashboard();
  renderStorico();

// ===================== RECEIPT SCAN =====================
async function handleReceiptScan(input) {
  const cfg = getCfg();
  if (!cfg.apiKey) {
    alert('Inserisci la tua API key OpenAI nelle Impostazioni');
    return;
  }
  const file = input.files[0];
  if (!file) return;
  const b64 = await toBase64(file);
  const prompt = `Sei un assistente per un supper club. Analizza questo scontrino/foto e rispondi SOLO con un JSON valido con questa struttura: {"voci":[{"nome":"string","categoria":"string","prezzo_aed":number}]}. Categorie possibili: Cibo, Vino, Ingredienti, Pulizie, Varie. Converti tutti i prezzi in AED (1 USD ≈ 3.67 AED, 1 EUR ≈ 4 AED).`;
  try {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${cfg.apiKey}` },
      body: JSON.stringify({
        model: 'gpt-4o',
        messages: [{ role:'user', content:[{ type:'text', text:prompt },{ type:'image_url', image_url:{ url:`data:${file.type};base64,${b64}` }}]}],
        max_tokens: 800
      })
    });
    const data = await res.json();
    const raw = data.choices?.[0]?.message?.content || '{}';
    const cleaned = raw.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(cleaned);
    if (parsed.voci) importWizCosts(parsed.voci);
  } catch(e) {
    alert('Errore scansione: ' + e.message);
  }
  input.value = '';
}

function importWizCosts(voci) {
  voci.forEach(v => {
    wiz.costs.push({ cat: '🥩 ' + (v.categoria||'Varie'), name: v.nome||'', amount: v.prezzo_aed||0 });
  });
  renderWizStep3();
}

function toBase64(file) {
  return new Promise((res,rej) => {
    const reader = new FileReader();
    reader.onload = () => res(reader.result.split(',')[1]);
    reader.onerror = rej;
    reader.readAsDataURL(file);
  });
}

// ===================== AI CHAT =====================
let chatMsgs = [];
let chatImgB64 = null;
let chatImgType = null;

function initChat() {
  chatMsgs = [];
  const greeting = `Ciao! 👋 Sono il tuo assistente per il Supper Club. Posso aiutarti a:\n\n• Aggiungere ospiti e serate\n• Analizzare scontrini e costi\n• Rispondere in italiano e inglese\n\nCome posso aiutarti oggi?`;
  appendChatMsg('ai', greeting);
}

function appendChatMsg(role, text) {
  const el = document.getElementById('chat-msgs');
  if (!el) return;
  const div = document.createElement('div');
  div.className = `chat-msg ${role}`;
  div.innerHTML = role === 'ai'
    ? `<div class="chat-av">🤖</div><div class="chat-bubble">${text.replace(/\n/g,'<br>')}</div>`
    : `<div class="chat-bubble">${text.replace(/\n/g,'<br>')}</div><div class="chat-av">👤</div>`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function appendTyping() {
  const el = document.getElementById('chat-msgs');
  const div = document.createElement('div');
  div.className = 'chat-msg ai';
  div.id = 'typing-indicator';
  div.innerHTML = `<div class="chat-av">🤖</div><div class="chat-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
  return div;
}

function chatImgSelected(input) {
  const file = input.files[0];
  if (!file) return;
  chatImgType = file.type;
  toBase64(file).then(b64 => {
    chatImgB64 = b64;
    const inEl = document.getElementById('chat-in');
    if (inEl) inEl.placeholder = '📎 Immagine allegata · scrivi messaggio...';
  });
}

function buildSysPrompt() {
  const events = getEvents();
  const guests = getGuests();
  const slots = getSlots();
  const upcoming = slots.filter(s => s.date >= today()).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,5);
  const recent = events.sort((a,b)=>b.data.localeCompare(a.data)).slice(0,5);

  const guestsSummary = guests.slice(0,20).map(g => `${g.name}${g.restrictions?` (⚠️ ${g.restrictions})`:''}`).join(', ');
  const upcomingSummary = upcoming.map(s => `${s.date} [${s.status}] ${s.maxGuests||8} posti`).join('; ');
  const recentSummary = recent.map(e => `${e.data}: ${e.ricavi?.nOspiti||0} ospiti, profitto ${aed(e.profitto||0)}`).join('; ');

  return `Sei l'assistente AI di un supper club privato a Dubai. Rispondi in italiano o inglese a seconda della lingua dell'utente.

CONTESTO ATTUALE:
- Ospiti in rubrica: ${guests.length} (${guestsSummary || 'nessuno'})
- Serate pianificate: ${upcomingSummary || 'nessuna'}
- Ultime serate: ${recentSummary || 'nessuna'}

CAPACITÀ:
1. Rispondere a domande su costi, profitti, ospiti, serate
2. Analizzare screenshot di DM per estrarre info ospiti
3. Suggerire quando aprire/chiudere date
4. Calcolare statistiche

Quando puoi aggiungere un ospite o una serata, includi alla fine del messaggio un blocco JSON nel formato:
|||ACT|||{"type":"add_contact","data":{"name":"...","restrictions":"...","instagram":"..."}}|||END|||
oppure:
|||ACT|||{"type":"add_slot","data":{"date":"YYYY-MM-DD","maxGuests":8,"pricePerPerson":0,"status":"open"}}|||END|||

Sii conciso, pratico e amichevole.`;
}

async function sendChat() {
  const input = document.getElementById('chat-in');
  const text = input?.value?.trim();
  if (!text && !chatImgB64) return;
  const cfg = getCfg();
  if (!cfg.apiKey) {
    alert('Inserisci la tua API key OpenAI nelle Impostazioni ⚙️');
    return;
  }

  const userMsg = text || '(immagine)';
  appendChatMsg('user', userMsg);
  if (input) { input.value = ''; input.placeholder = 'Scrivi un messaggio...'; }

  const typing = appendTyping();

  const contentArr = [];
  if (text) contentArr.push({ type:'text', text });
  if (chatImgB64) contentArr.push({ type:'image_url', image_url:{ url:`data:${chatImgType};base64,${chatImgB64}` }});
  chatImgB64 = null; chatImgType = null;

  const messages = [
    { role:'system', content: buildSysPrompt() },
    ...chatMsgs.filter(m=>m.role!=='system').slice(-10),
    { role:'user', content: contentArr.length === 1 && contentArr[0].type === 'text' ? text : contentArr }
  ];
  chatMsgs.push({ role:'user', content: userMsg });

  try {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${cfg.apiKey}` },
      body: JSON.stringify({ model:'gpt-4o', messages, max_tokens:1000 })
    });
    const data = await res.json();
    const raw = data.choices?.[0]?.message?.content || 'Errore nella risposta.';
    typing.remove();

    // Parse action blocks
    const actRegex = /\|\|\|ACT\|\|\|([\s\S]*?)\|\|\|END\|\|\|/g;
    let displayText = raw.replace(actRegex, '').trim();
    appendChatMsg('ai', displayText);
    chatMsgs.push({ role:'assistant', content: raw });

    let match;
    const actRegex2 = /\|\|\|ACT\|\|\|([\s\S]*?)\|\|\|END\|\|\|/g;
    while ((match = actRegex2.exec(raw)) !== null) {
      try {
        const act = JSON.parse(match[1]);
        handleAIAction(act);
      } catch(e) {}
    }
  } catch(e) {
    typing.remove();
    appendChatMsg('ai', 'Errore di rete: ' + e.message);
  }
}

function handleAIAction(act) {
  const el = document.getElementById('chat-msgs');
  if (act.type === 'add_contact' && act.data?.name) {
    const card = document.createElement('div');
    card.className = 'chat-msg ai';
    card.innerHTML = `<div class="chat-av">🤖</div><div class="chat-bubble"><div class="action-card">
      <div class="action-card-title">Aggiungere questo ospite?</div>
      <div style="font-size:14px;font-weight:700;">${act.data.name}</div>
      ${act.data.instagram?`<div style="font-size:12px;color:var(--muted);">${act.data.instagram}</div>`:''}
      ${act.data.restrictions?`<div style="font-size:12px;color:var(--red);">⚠️ ${act.data.restrictions}</div>`:''}
      <button class="btn btn-gold btn-sm" style="margin-top:8px;" onclick="confirmAIAddContact(${JSON.stringify(act.data).replace(/"/g,'&quot;')},this)">✓ Aggiungi</button>
    </div></div>`;
    el.appendChild(card);
    el.scrollTop = el.scrollHeight;
  }
  if (act.type === 'add_slot' && act.data?.date) {
    const card = document.createElement('div');
    card.className = 'chat-msg ai';
    card.innerHTML = `<div class="chat-av">🤖</div><div class="chat-bubble"><div class="action-card">
      <div class="action-card-title">Aprire questa data?</div>
      <div style="font-size:14px;font-weight:700;">${fmtDate(act.data.date)}</div>
      <div style="font-size:12px;color:var(--muted);">Max ${act.data.maxGuests||8} ospiti</div>
      <button class="btn btn-gold btn-sm" style="margin-top:8px;" onclick="openSlotWizard('${act.data.date}');showPage('calendario')">→ Apri nel Calendario</button>
    </div></div>`;
    el.appendChild(card);
    el.scrollTop = el.scrollHeight;
  }
}

function confirmAIAddContact(data, btn) {
  const guests = getGuests();
  const newGuest = {
    id: uid(),
    name: data.name || '',
    instagram: data.instagram || '',
    phone: data.phone || '',
    restrictions: data.restrictions || '',
    notes: data.notes || '',
    addedAt: new Date().toISOString()
  };
  guests.push(newGuest);
  saveGuests(guests);
  btn.textContent = '✅ Aggiunto!';
  btn.disabled = true;
  renderGuestList();
}
